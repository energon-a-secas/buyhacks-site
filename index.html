<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://esm.sh; style-src 'self' 'unsafe-inline'; img-src 'self' https://minibooks.lucianoadonis.com data:; connect-src 'self' https://*.convex.cloud">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuyHacks — Product Life Hacks</title>
  <meta name="description" content="Curated product showcase with community votes and life-hack tips. Browse 24 tested products, vote love/own/want, and share your best tips">
  <meta name="theme-color" content="#040714">
  <meta property="og:title" content="BuyHacks — Product Life Hacks">
  <meta property="og:description" content="Curated product showcase with community votes and life-hack tips">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://buyhacks.neorgon.com/">
  <meta property="og:site_name" content="Neorgon">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BuyHacks — Product Life Hacks">
  <meta name="twitter:description" content="Curated product showcase with community votes and life-hack tips">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://buyhacks.neorgon.com/">
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="css/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "BuyHacks",
    "url": "https://buyhacks.neorgon.com/",
    "description": "Curated product showcase with community votes and life-hack tips",
    "applicationCategory": "LifestyleApplication",
    "author": { "@type": "Organization", "name": "Neorgon", "url": "https://neorgon.com/" }
  }
  </script>
</head>
<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <header class="header-bar">
    <div class="header-logo">
      <a href="https://ehq.cl/" target="_blank" rel="noopener noreferrer">
        <img src="energon-classic-logo.png" class="header-logo-img" alt="Logo">
      </a>
      <div>
        <h1>BuyHacks</h1>
        <div class="header-subtitle">Product Life Hacks</div>
      </div>
    </div>

    <button class="auth-toggle-btn" id="auth-toggle" aria-label="Account">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>

    <a class="header-home" href="https://neorgon.com/" title="neorgon.com" aria-label="Neorgon home">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </a>
  </header>

  <!-- Auth panel (collapsed) -->
  <div class="auth-panel" id="auth-panel">
    <div id="auth-login">
      <input type="text" id="auth-username-input" placeholder="Username" autocomplete="username" maxlength="20">
      <input type="password" id="auth-password-input" placeholder="Password" autocomplete="current-password">
      <div class="auth-btns">
        <button id="auth-login-btn" class="btn-sm">Login</button>
        <button id="auth-register-btn" class="btn-sm btn-outline">Register</button>
      </div>
    </div>
    <div id="auth-user" hidden>
      <span>Logged in as <strong id="auth-username"></strong></span>
      <button id="auth-logout-btn" class="btn-sm btn-outline">Logout</button>
    </div>
  </div>

  <main id="main">
    <div class="container">
      <!-- Controls -->
      <div class="controls">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="search" id="search-input" placeholder="Search products..." autocomplete="off">
        </div>
        <select id="sort-select">
          <option value="default">Default order</option>
          <option value="love">Most loved</option>
          <option value="own">Most owned</option>
          <option value="want">Most wanted</option>
        </select>
      </div>

      <div id="category-chips" class="chips"></div>
      <div class="result-meta"><span id="result-count"></span></div>

      <!-- Product grid -->
      <div id="product-grid" class="product-grid"></div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Scroll to top -->
  <button id="scroll-top" class="scroll-top" aria-label="Scroll to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script type="module" src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://esm.sh; style-src 'self' 'unsafe-inline'; img-src 'self' https://minibooks.lucianoadonis.com https://*.convex.cloud data: blob:; connect-src 'self' https://*.convex.cloud https://*.workers.dev">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuyHacks — Product Life Hacks</title>
  <meta name="description" content="Curated product showcase with community votes and life-hack tips. Browse 24 tested products, vote love/own/want, and share your best tips">
  <meta name="theme-color" content="#040714">
  <meta property="og:title" content="BuyHacks — Product Life Hacks">
  <meta property="og:description" content="Curated product showcase with community votes and life-hack tips">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://buyhacks.neorgon.com/">
  <meta property="og:site_name" content="Neorgon">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BuyHacks — Product Life Hacks">
  <meta name="twitter:description" content="Curated product showcase with community votes and life-hack tips">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://buyhacks.neorgon.com/">
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="css/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "BuyHacks",
    "url": "https://buyhacks.neorgon.com/",
    "description": "Curated product showcase with community votes and life-hack tips",
    "applicationCategory": "LifestyleApplication",
    "author": { "@type": "Organization", "name": "Neorgon", "url": "https://neorgon.com/" }
  }
  </script>
</head>
<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <header class="header-bar">
    <div class="header-logo">
      <a href="https://ehq.cl/" target="_blank" rel="noopener noreferrer">
        <img src="energon-classic-logo.png" class="header-logo-img" alt="Logo">
      </a>
      <div>
        <h1>BuyHacks</h1>
        <div class="header-subtitle">Product Life Hacks</div>
      </div>
    </div>

    <nav>
      <button class="nav-link" id="addProductToggle" style="color:var(--accent);border-color:rgba(245,158,11,.2)">Add Product</button>
      <button class="auth-toggle" id="authToggle" aria-label="Account">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M7.5 6.5C7.5 8.981 9.519 11 12 11s4.5-2.019 4.5-4.5S14.481 2 12 2 7.5 4.019 7.5 6.5zM20 21h1v-1c0-3.859-3.141-7-7-7h-4c-3.86 0-7 3.141-7 7v1h17z"/>
        </svg>
      </button>
      <a class="header-home" href="https://neorgon.com/" title="neorgon.com" aria-label="Neorgon home" style="margin-left:5px">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </a>
    </nav>
  </header>

  <!-- Auth panel (collapsible, below header) -->
  <div class="auth-panel" id="authPanel">
    <div class="auth-panel-inner">
      <div id="authGate">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Log In</button>
          <button class="auth-tab" data-tab="register">Register</button>
        </div>
        <div class="auth-form" id="authLoginForm">
          <input type="text" id="authLoginUser" placeholder="Username" autocomplete="username" maxlength="20">
          <input type="password" id="authLoginPass" placeholder="Password" autocomplete="current-password">
          <button class="auth-submit" id="authLoginBtn">Log In</button>
        </div>
        <div class="auth-form" id="authRegisterForm" hidden>
          <input type="text" id="authRegUser" placeholder="Choose a username" autocomplete="username" maxlength="20">
          <input type="password" id="authRegPass" placeholder="Choose a password" autocomplete="new-password">
          <button class="auth-submit" id="authRegBtn">Register</button>
        </div>
      </div>
      <div id="authUser" hidden>
        <span class="auth-username" id="authUsername"></span>
        <span class="auth-role" id="authRole" hidden>admin</span>
        <button class="auth-logout" id="authLogout">Log out</button>
      </div>
    </div>
  </div>
  <div class="auth-divider"></div>

  <main id="main">
    <div class="container">

      <!-- Add Product panel (collapsible) -->
      <div class="upload-panel" id="uploadPanel">
        <h3 class="upload-heading">Add Product</h3>
        <div id="uploadLoginPrompt">
          <p class="upload-login-msg">Log in to add products.</p>
        </div>
        <div id="uploadZone" style="display:none">
          <div class="upload-form-grid">
            <div class="upload-image-col">
              <div class="drop-zone" id="dropZone">Drop image here or click to browse</div>
              <input type="file" id="fileInput" accept="image/png,image/jpeg,image/gif,image/webp" style="display:none">
              <img id="previewImg" src="" alt="preview" class="upload-preview-img" style="display:none">
            </div>
            <div class="upload-fields-col">
              <input type="text" id="productName" placeholder="Product name" maxlength="60" class="upload-input">
              <input type="text" id="productBrand" placeholder="Brand" maxlength="60" class="upload-input">
              <select id="productCategory" class="upload-input">
                <option value="organization">Organization</option>
                <option value="cleaning-lifestyle">Cleaning & Lifestyle</option>
                <option value="work-tech">Work Tech</option>
                <option value="specific-useful">Specific But Useful</option>
                <option value="aliexpress">AliExpress Finds</option>
                <option value="house-tools">House Tools</option>
                <option value="tried-but">Tried But...</option>
              </select>
              <input type="text" id="productDescription" placeholder="Short description" maxlength="200" class="upload-input">
              <input type="text" id="productTags" placeholder="Tags (comma-separated)" maxlength="120" class="upload-input">
              <select id="productVerdict" class="upload-input">
                <option value="recommended">Recommended</option>
                <option value="mixed">Mixed Feelings</option>
                <option value="skip">Skip</option>
              </select>
              <label class="removebg-toggle">
                <input type="checkbox" id="removeBgToggle" checked>
                <span>Remove background</span>
              </label>
              <button class="upload-submit-btn" id="uploadSubmit">Submit Product</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="search" id="search-input" placeholder="Search products..." autocomplete="off">
        </div>
        <select id="sort-select">
          <option value="default">Default order</option>
          <option value="love">Most loved</option>
          <option value="own">Most owned</option>
          <option value="want">Most wanted</option>
        </select>
      </div>

      <div id="category-chips" class="chips"></div>
      <div class="result-meta"><span id="result-count"></span></div>

      <!-- Product grid -->
      <div id="product-grid" class="product-grid"></div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Scroll to top -->
  <button id="scroll-top" class="scroll-top" aria-label="Scroll to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script type="module" src="js/app.js"></script>
</body>
</html>
